<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="moneyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#moneyGradient)"/>

  <!-- Dollar Sign -->
  <path d="M 32 12 L 32 52 M 24 18 Q 28 14 32 14 Q 38 14 38 20 Q 38 26 32 28 L 32 28 Q 26 30 26 36 Q 26 42 32 42 Q 36 42 40 38"
        stroke="white"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Coin Shine Effect -->
  <path d="M 20 18 Q 25 16 30 18"
        stroke="white"
        stroke-width="2"
        stroke-opacity="0.5"
        stroke-linecap="round"
        fill="none"/>
</svg>
